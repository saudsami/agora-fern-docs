  /v2/projects/{appid}/agents/{agentId}/update:
    post:
      tags:
        - Agent Management
      summary: Update agent configuration
      description: Adjust Conversation AI Engine parameters at runtime.
      operationId: update-agent
      parameters:
        - $ref: '#/components/parameters/appid'
        - $ref: '#/components/parameters/agentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  type: object
                  description: Configuration properties to update.
                  properties:
                    token:
                      type: string
                      description: The authentication token used by the agent to join the channel.
                    llm:
                      type: object
                      description: Large Language Model (LLM) settings.
                      properties:
                        system_messages:
                          type: array
                          description: A set of predefined messages appended to the beginning of each LLM request. These messages help control the LLM's output and can include role definitions, prompts, response examples, and more. This field must be compatible with the OpenAI protocol.
                          items:
                            type: object
                            additionalProperties: true
                        params:
                          type: object
                          description: Additional LLM information included in the message body, such as the model used, the maximum number of tokens, and more. Supported configurations vary by LLM provider. Refer to the provider's documentation for details. Updating this field overwrites the configuration set when the agent was created. When updating, make sure to pass the complete `params` field.
                          additionalProperties: true
                    mllm:
                      type: object
                      description: Multimodal Large Language Model (MLLM) configuration for real-time audio and text processing.
                      properties:
                        params:
                          type: object
                          description: Additional MLLM configuration parameters. See [MLLM Overview](https://docs.agora.io/en/conversational-ai/models/mllm/overview) for details.
                          additionalProperties: true
            examples:
              Update LLM:
                value:
                  properties:
                    token: 007eJxTYxxxxxxxxxxIaHMLAAAA0ex66
                    llm:
                      system_messages:
                        - role: system
                          content: You are a helpful assistant. xxx
                        - role: system
                          content: 'Previously, user has talked about their favorite hobbies with some key topics: xxx'
                      params:
                        model: abab6.5s-chat
                        max_token: 1024
      responses:
        '200':
          description: Request was successful. The response body contains the result of the request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                    description: Unique id of the agent instance
                  create_ts:
                    type: integer
                    description: Timestamp of when the agent was created
                  status:
                    type: string
                    enum:
                      - IDLE
                      - STARTING
                      - RUNNING
                      - STOPPING
                      - STOPPED
                      - FAILED
                    description: |-
                      Current status:
                      - `IDLE` (0): Agent is idle.
                      - `STARTING` (1): The agent is being started.
                      - `RUNNING` (2): The agent is running.
                      - `STOPPING` (3): The agent is stopping.
                      - `STOPPED` (4): The agent has exited.
                      - `FAILED` (6): The agent failed to execute.
              examples:
                Success:
                  value:
                    agent_id: 1NT29X10YHxxxxxWJOXLYHNYB
                    create_ts: 1737123456
                    status: RUNNING
        default:
          description: Request failed. The response body includes the `detail` and `reason` for failure.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: Error detail message
                  reason:
                    type: string
                    description: Error reason code

  /v2/projects/{appid}/agents/{agentId}/speak:
    post:
      tags:
        - Agent Management
      summary: Broadcast a message using TTS
      description: |-
        Broadcast a custom message using the TTS module.
        
        During a conversation with an agent, call this endpoint to immediately broadcast a custom message using the TTS module. Upon receiving the request, the system interrupts the agent's speech and thought process to deliver the message. This broadcast can be interrupted by human voice.
        
        Note: The speak API is not supported when using `mllm` configuration.
      operationId: agent-speak
      parameters:
        - $ref: '#/components/parameters/appid'
        - $ref: '#/components/parameters/agentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  maxLength: 512
                  description: The broadcast message text. The maximum length of the text content is 512 bytes.
                priority:
                  type: string
                  enum:
                    - INTERRUPT
                    - APPEND
                    - IGNORE
                  default: INTERRUPT
                  description: |-
                    Sets the priority of the message broadcast:
                    - `INTERRUPT`: High priority. The agent immediately interrupts the current interaction to announce the message.
                    - `APPEND`: Medium priority. The agent announces the message after the current interaction ends.
                    - `IGNORE`: Low priority. If the agent is busy interacting, it ignores and discards the broadcast; the message is only announced if the agent is not interacting.
                interruptable:
                  type: boolean
                  default: true
                  description: |-
                    Whether to allow users to interrupt the agent's broadcast by speaking:
                    - `true`: Allow
                    - `false`: Don't allow
            examples:
              Broadcast message:
                value:
                  text: Sorry, the conversation content is not compliant.
                  priority: INTERRUPT
                  interruptable: false
      responses:
        '200':
          description: Request was successful. The agent starts to broadcast the specified message.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                    description: Unique id of the agent instance
                  channel:
                    type: string
                    description: The name of the channel
                  start_ts:
                    type: integer
                    description: Timestamp when the broadcast started
              examples:
                Success:
                  value:
                    agent_id: '1NT29XxxxxxxxxELWEHC8OS'
                    channel: 'test_channel'
                    start_ts: 1744877089
        default:
          description: Request failed. The response body includes the error code and description.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: Error detail message
                  reason:
                    type: string
                    description: Error reason code
              examples:
                Error:
                  value:
                    detail: 'Agent not found or not in correct state'
                    reason: 'invalid_agent_state'

  /v2/projects/{appid}/agents/{agentId}/think:
    post:
      tags:
        - Agent Management
      summary: Send a custom instruction
      description: |-
        Send a custom text instruction to the specified conversational AI agent instance.

        The instruction is injected into the current conversation pipeline as user input, and the agent processes and responds to it following the standard user input logic.

        Use this endpoint for the following scenarios:
        - **Implicit instruction injection**: Inject hidden context or directives into the conversation.
        - **Client-side event triggering**: Notify the agent of client-side events, such as a user clicking a button.
        - **Voice and text collaboration**: Combine text instructions with voice input for richer interaction.
      operationId: agent-think
      parameters:
        - $ref: '#/components/parameters/appid'
        - $ref: '#/components/parameters/agentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  description: The custom instruction text to inject into the current conversation pipeline. The system processes this as user input.
                on_listening_action:
                  type: string
                  default: interrupt
                  enum:
                    - inject
                    - interrupt
                    - ignore
                  description: |-
                    The action to take when the agent is in a listening state:
                    - `inject`: Inject the custom text instruction into the current turn without interrupting it.
                    - `interrupt`: Immediately interrupt the current flow and initiate a new round of dialogue.
                    - `ignore`: Ignore the request.
                on_thinking_action:
                  type: string
                  default: interrupt
                  enum:
                    - interrupt
                    - ignore
                  description: |-
                    The action to take when the agent is in a thinking state:
                    - `interrupt`: Interrupt the current state and start a new conversation turn.
                    - `ignore`: Ignore the request.
                on_speaking_action:
                  type: string
                  default: ignore
                  enum:
                    - interrupt
                    - ignore
                  description: |-
                    The action to take when the agent is in a speaking state:
                    - `interrupt`: Interrupt the current state and start a new conversation turn.
                    - `ignore`: Ignore the request.
                interruptable:
                  type: boolean
                  default: true
                  description: |-
                    Whether user speech can interrupt the injected instruction:
                    - `true`: User speech can interrupt the instruction.
                    - `false`: User speech cannot interrupt the instruction.
                metadata:
                  type: object
                  description: Custom metadata in key-value pair format. Use this field to pass additional business information such as identifiers or model references.
                  additionalProperties:
                    type: string
            examples:
              Inject instruction:
                value:
                  text: The user just clicked the purchase button.
                  on_listening_action: inject
                  on_thinking_action: interrupt
                  on_speaking_action: ignore
                  interruptable: true
                  metadata:
                    publisher: user123
                    model: deepseek-r1
      responses:
        '200':
          description: Request was successful. The response body contains the result of the request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                    description: Unique identifier of the agent instance.
                  channel:
                    type: string
                    description: The name of the RTC channel where the agent is located.
                  start_ts:
                    type: integer
                    description: Timestamp indicating when the agent was created.
              examples:
                Success:
                  value:
                    agent_id: '1NT29XxxxxxxxxELWEHC8OS'
                    channel: 'test_channel'
                    start_ts: 1744877089
        default:
          description: Request failed. The response body includes the `detail` and `reason` for failure.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: Error detail message
                  reason:
                    type: string
                    description: Error reason code

  /v2/projects/{appid}/agents/{agentId}/interrupt:
    post:
      tags:
        - Agent Management
      summary: Interrupt the agent
      description: Interrupt the specified agent while speaking or thinking.
      operationId: agent-interrupt
      parameters:
        - $ref: '#/components/parameters/appid'
        - $ref: '#/components/parameters/agentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
            examples:
              Empty body:
                value: {}
      responses:
        '200':
          description: Request was successful. The response body contains agent information and the agent stops talking and thinking immediately.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                    description: Unique id of the agent instance
                  channel:
                    type: string
                    description: The name of the channel
                  start_ts:
                    type: integer
                    description: Timestamp when the broadcast started
              examples:
                Success:
                  value:
                    agent_id: '1NT29XxxxxxxxxELWEHC8OS'
                    channel: 'test_channel'
                    start_ts: 1744877089

  /v2/projects/{appid}/call:
    post:
      tags:
        - Telephony
      summary: Initiate an outbound call
      description: |-
        Initiate an outbound call to a specified number and create an agent to join the specified RTC channel.
        
        Use this endpoint to initiate an outbound call to the specified number and create an agent that joins the target RTC channel. The agent waits for the callee to answer.
      operationId: initiate-outbound-call
      parameters:
        - $ref: '#/components/parameters/appid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - sip
                - properties
              properties:
                name:
                  type: string
                  description: The name identifier of the call session.
                sip:
                  type: object
                  required:
                    - to_number
                    - from_number
                    - rtc_uid
                    - rtc_token
                  description: SIP (Session Initiation Protocol) call configuration object.
                  properties:
                    to_number:
                      type: string
                      description: Called number (target phone number), in E.164 format.
                    from_number:
                      type: string
                      description: Caller ID (the number that initiated the call), in E.164 format.
                    rtc_uid:
                      type: string
                      description: The RTC UID used by the SIP gateway.
                    rtc_token:
                      type: string
                      description: The RTC token used by the SIP gateway.
                pipeline_id:
                  type: string
                  description: The unique ID of a published project in AI Studio.
                properties:
                  type: object
                  required:
                    - channel
                    - token
                    - agent_rtc_uid
                  description: |-
                    Call attribute configuration. The content of this field varies depending on the invocation method:
                    - **Using pipeline ID**: Simply pass in `channel`, `token`, `agent_rtc_uid`, and `remote_rtc_uids`.
                    - **Using complete configuration**: Pass in the complete parameters of the [Start a conversational AI agent](https://docs.agora.io/en/conversational-ai/rest-api/agent/join) `properties`, including all required fields such as `channel`, `token`, `agent_rtc_uid`, `remote_rtc_uids`, `tts`, and `llm`.
                  properties:
                    channel:
                      type: string
                      description: RTC channel name.
                    token:
                      type: string
                      description: RTC Channel Token.
                    agent_rtc_uid:
                      type: string
                      description: The agent's user ID in the RTC channel.
                    remote_rtc_uids:
                      type: array
                      description: A list of RTC user IDs. When using pipeline ID, this should contain the SIP gateway UID.
                      items:
                        type: string
                  additionalProperties: true
            examples:
              Pipeline ID:
                value:
                  name: customer_service
                  sip:
                    to_number: '+19876543210'
                    from_number: '+11234567890'
                    rtc_uid: '100'
                    rtc_token: '<agora_sip_rtc_token>'
                  pipeline_id: fzufjlweixxxxnlp
                  properties:
                    channel: '<agora_channel>'
                    token: '<agora_channel_token>'
                    agent_rtc_uid: '111'
                    remote_rtc_uids:
                      - '100'
              Full configuration:
                value:
                  name: customer_service
                  sip:
                    to_number: '+19876543210'
                    from_number: '+11234567890'
                    rtc_uid: '100'
                    rtc_token: '<agora_sip_rtc_token>'
                  properties:
                    channel: '<agora_channel>'
                    token: '<agora_channel_token>'
                    agent_rtc_uid: '111'
                    remote_rtc_uids:
                      - '100'
                    idle_timeout: 120
                    llm:
                      url: 'https://api.openai.com/v1/chat/completions'
                      api_key: '<your_llm_key>'
                      system_messages:
                        - role: system
                          content: You are a helpful chatbot.
                      max_history: 32
                      greeting_message: Hello, how can I assist you today?
                      failure_message: Please hold on a second.
                      params:
                        model: gpt-4o-mini
                    tts:
                      vendor: microsoft
                      params:
                        key: '<your_tts_api_key>'
                        region: eastus
                        voice_name: en-US-AndrewMultilingualNeural
                    asr:
                      language: en-US
      responses:
        '200':
          description: Request was successful. The response body contains the result of the request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                    description: Unique ID of the agent instance. Use it to query call status, control call flow, and perform other operations.
              examples:
                Success:
                  value:
                    agent_id: A42AK62PExxxxxxxx74LN47MF46E
        default:
          description: |- 
            Request failed. The response body includes the error code and description.
            
            **Common error codes:**
            - `400` `invalid_phone_format`:  Invalid phone number format (not in E.164 format).
            - `401` `unauthorized`: Authentication failed, please check your credentials.
            - `500` `internal_server_error`: Internal server error. 
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_type:
                    type: string
                    description: The type of error that occurred.
                  description:
                    type: string
                    description: A detailed description of the error.
              examples:
                Error:
                  value:
                    error_type: invalid_phone_format
                    description: Invalid phone number format (not E.164 format).

    get:
      tags:
        - Telephony
      summary: Retrieve call records
      description: Query historical call records for a specified appid based on the filter criteria.
      operationId: retrieve-call-records
      parameters:
        - $ref: '#/components/parameters/appid'
        - name: number
          in: query
          required: false
          description: Filter by phone number. Can be either the calling number or the called number.
          schema:
            type: string
        - name: from_time
          in: query
          required: false
          description: Query list start timestamp (in seconds). Default is 60 days ago.
          schema:
            type: integer
        - name: to_time
          in: query
          required: false
          description: Query list end timestamp (in seconds). Default is current time.
          schema:
            type: integer
        - name: type
          in: query
          required: false
          description: |-
            Call type filter:
            - `inbound`: Inbound call.
            - `outbound`: Outbound call.
            
            If not specified, all call types are returned.
          schema:
            type: string
            enum:
              - inbound
              - outbound
        - name: limit
          in: query
          required: false
          description: Maximum number of items returned in a single page.
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          description: Pagination cursor. Use the `agent_id` from the previous page as the cursor for the next page.
          schema:
            type: string
      responses:
        '200':
          description: Request was successful. The response body contains the result of the request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Call data object.
                    properties:
                      count:
                        type: integer
                        description: The number of calls returned in this response.
                      list:
                        type: array
                        description: A list of calls that meet the criteria.
                        items:
                          type: object
                          properties:
                            to_number:
                              type: string
                              description: The number called.
                            from_number:
                              type: string
                              description: Caller ID.
                            pipeline_id:
                              type: string
                              description: The unique ID of a published project in AI Studio. Can be obtained in AI Studio - Project - Release Management.
                            type:
                              type: string
                              enum:
                                - inbound
                                - outbound
                              description: |-
                                Call type:
                                - `inbound`: Inbound call.
                                - `outbound`: Outbound call.
                            agent_id:
                              type: string
                              description: A unique identifier for the call session.
                            channel:
                              type: string
                              description: RTC channel name.
                            create_ts:
                              type: integer
                              description: Call creation timestamp (in seconds).
                            state:
                              type: string
                              enum:
                                - answered
                                - hangup
                              description: |-
                                Call status:
                                - `answered`: The call was answered.
                                - `hangup`: The call was disconnected.
                            stop_ts:
