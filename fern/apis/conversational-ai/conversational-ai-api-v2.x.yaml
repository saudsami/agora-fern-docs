openapi: 3.0.3
info:
  version: '2.5'
  title: Agora Conversational AI API
  description: |-
    This document describes the RESTful API for Agora Conversational AI.

    ## Data Format

    All HTTP request headers have a Content-Type of `application/json`. All request and response content is in JSON format.

servers:
  - url: https://api.agora.io/api/conversational-ai-agent
    description: Production API server

paths:
  /v2/projects/{appid}/join:
    post:
      tags:
        - Agent Management
      summary: Start a conversational AI agent
      description: Create and start a Conversational AI agent instance.
      operationId: start-agent
      parameters:
        - $ref: '#/components/parameters/appid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - properties
              properties:
                name:
                  type: string
                  description: The unique identifier of the agent. The same identifier cannot be used repeatedly.
                preset:
                  type: string
                  description: |-
                    A comma-separated string of one or more presets. Each preset provides a predefined configuration for ASR, LLM, and TTS. You can specify a preset for any or all of ASR, LLM, and TTS. When a preset is specified, you do not need to provide the endpoint URL, API key, or model for the preset providers. Use the `asr`, `llm`, and `tts` fields to configure additional settings.

                    Available presets:
                    - ASR: `deepgram_nova_2`, `deepgram_nova_3`
                    - LLM: `openai_gpt_4o_mini`, `openai_gpt_4_1_mini`, `openai_gpt_5_nano`, `openai_gpt_5_mini`
                    - TTS: `minimax_speech_2_6_turbo`, `minimax_speech_2_8_turbo`, `openai_tts_1`
                pipeline_id:
                  type: string
                  description: The unique ID of a published agent in AI Studio. When provided, the saved agent configuration is used as the base configuration. Any fields specified in `properties` override the corresponding agent settings. When you specify a `pipeline_id`, the `asr`, `tts`, and `llm` fields in `properties` are optional.
                properties:
                  type: object
                  description: Configuration details of the agent.
                  required:
                    - channel
                    - token
                    - agent_rtc_uid
                    - remote_rtc_uids
                  properties:
                    channel:
                      type: string
                      description: The name of the channel to join.
                    token:
                      type: string
                      description: The authentication token used by the agent to join the channel.
                    agent_rtc_uid:
                      type: string
                      description: The user ID of the agent in the channel. All UIDs within an RTC channel must be unique. Ensure no other user or service bot is using this UID. A value of `0` means that a unique random UID is generated and assigned. Set the `token` accordingly.
                    remote_rtc_uids:
                      type: array
                      description: A list of user IDs that the agent subscribes to in the channel. Only subscribed users can interact with the agent. Currently, only one user ID is supported.
                      items:
                        type: string
                    enable_string_uid:
                      type: boolean
                      default: false
                      description: |-
                        Whether to enable String uid:
                        - `true`: Both agent and subscriber user IDs use strings.
                        - `false`: Both agent and subscriber user IDs must be integers.
                    idle_timeout:
                      type: integer
                      default: 30
                      description: Sets the timeout after all the users specified in `remote_rtc_uids` are detected to have left the channel. When the timeout value is exceeded, the agent automatically stops and exits the channel. A value of `0` means that the agent does not exit until it is stopped manually.
                    geofence:
                      type: object
                      description: Regional access restriction configuration. Use this to limit which Agora servers the Conversational AI Engine can access based on geographic regions.
                      required:
                        - area
                      properties:
                        area:
                          type: string
                          enum:
                            - GLOBAL
                            - NORTH_AMERICA
                            - EUROPE
                            - ASIA
                            - INDIA
                            - JAPAN
                          description: The allowed region for server access.
                        exclude_area:
                          type: string
                          enum:
                            - NORTH_AMERICA
                            - EUROPE
                            - ASIA
                            - INDIA
                            - JAPAN
                          description: The excluded region. Only available when `area` is set to `GLOBAL`.
                    advanced_features:
                      type: object
                      description: Advanced features configuration.
                      properties:
                        enable_mllm:
                          type: boolean
                          default: false
                          deprecated: true
                          description: Use `mllm.enable` instead. Enable Multimodal Large Language Model for voice-to-voice processing. Enabling MLLM automatically disables ASR, LLM, and TTS since the MLLM handles end-to-end voice processing directly. See `turn_detection.type` for turn detection options available with MLLM.
                        enable_rtm:
                          type: boolean
                          default: false
                          description: Whether to enable the Signaling (RTM) service. When enabled, the agent can combine the capabilities provided by Signaling to implement advanced functions, such as delivering custom information. Before enabling the Signaling service, make sure the token includes both RTC and RTM privileges.
                        enable_sal:
                          type: boolean
                          default: false
                          description: Enable Selective Attention Locking (SAL). When enabled, configure the `sal` field to set up speaker recognition or locking modes.
                        enable_tools:
                          type: boolean
                          default: false
                          description: Enable tool invocation. When enabled, the agent can invoke tools provided by the MCP server to implement advanced functionality.
                    asr:
                      type: object
                      description: Automatic Speech Recognition (ASR) configuration.
                      properties:
                        language:
                          type: string
                          default: en-US
                          description: The BCP-47 language tag identifying the primary language used for agent interaction. If `params` contains a vendor-specific language code, it takes precedence over this setting.
                        vendor:
                          type: string
                          default: ares
                          enum:
                            - ares
                            - microsoft
                            - deepgram
                            - openai
                            - google
                            - amazon
                            - assemblyai
                            - speechmatics
                            - sarvam
                          description: |-
                            ASR provider:
                            - `ares`: Adaptive Recognition Engine for Speech
                            - `microsoft`: Microsoft Azure
                            - `deepgram`: Deepgram
                            - `openai`: OpenAI (Beta)
                            - `speechmatics`: Speechmatics
                            - `assemblyai`: AssemblyAI (Beta)
                            - `amazon`: Amazon Transcribe (Beta)
                            - `google`: Google (Beta)
                            - `sarvam`: Sarvam (Beta)
                        params:
                          type: object
                          description: The configuration parameters for the ASR vendor. See [ASR Overview](https://docs.agora.io/en/conversational-ai/models/asr/overview) for details.
                          additionalProperties: true
                    tts:
                      type: object
                      required:
                        - vendor
                        - params
                      description: Text-to-speech (TTS) module configuration.
                      properties:
                        vendor:
                          type: string
                          enum:
                            - microsoft
                            - elevenlabs
                            - minimax
                            - deepgram
                            - murf
                            - cartesia
                            - openai
                            - humeai
                            - rime
                            - fishaudio
                            - google
                            - amazon
                            - sarvam
                          description: |-
                            TTS provider:
                            - `microsoft`: Microsoft Azure
                            - `elevenlabs`: ElevenLabs
                            - `minimax`: MiniMax
                            - `deepgram`: Deepgram (Beta)
                            - `murf`: Murf (Beta)
                            - `cartesia`: Cartesia (Beta)
                            - `openai`: OpenAI (Beta)
                            - `humeai`: Hume AI (Beta)
                            - `rime`: Rime (Beta)
                            - `fishaudio`: Fish Audio (Beta)
                            - `google`: Google (Beta)
                            - `amazon`: Amazon Polly (Beta)
                            - `sarvam`: Sarvam (Beta)
                        params:
                          type: object
                          description: The configuration parameters for the TTS vendor. See [TTS Overview](https://docs.agora.io/en/conversational-ai/models/tts/overview) for details.
                          additionalProperties: true
                        skip_patterns:
                          type: array
                          description: |-
                            Controls whether the TTS module skips bracketed content when reading LLM response text. Enable this feature by specifying one or more values:
                            - `1`: Skip content in Chinese parentheses （）
                            - `2`: Skip content in Chinese square brackets 【】
                            - `3`: Skip content in parentheses ( )
                            - `4`: Skip content in square brackets [ ]
                            - `5`: Skip content in curly braces { }

                            > - **Nested brackets**: When input text contains nested brackets and multiple bracket types are configured to be skipped, the system processes only the outermost brackets. The system matches from the beginning of the text and skips the first outermost bracket pair that meets the skip rule, including all nested content.
                            > - **Agent memory**: The agent's short-term memory always contains the complete, unfiltered LLM text, regardless of live captioning settings.
                            > - **Real-time transcript**: When enabled, transcript excludes filtered content during TTS playback but restores the complete text after each sentence finishes.
                          items:
                            type: integer
                          default: []
                    llm:
                      type: object
                      required:
                        - url
                      description: Large language model (LLM) configuration.
                      properties:
                        url:
                          type: string
                          description: The LLM callback address.
                        api_key:
                          type: string
                          default: ''
                          description: The LLM verification API key. The default value is an empty string. Ensure that you enable the API key in a production environment.
                        system_messages:
                          type: array
                          description: A set of predefined information used as input to the LLM, including prompt words and examples.
                          items:
                            type: object
                            additionalProperties: true
                        params:
                          type: object
                          description: Additional LLM configuration parameters, such as the `model` used, and the maximum token limit. For details about each supported LLM, refer to [Supported LLMs](https://docs.agora.io/en/conversational-ai/models/llm/overview#supported-llms).
                          additionalProperties: true
                        max_history:
                          type: integer
                          default: 32
                          minimum: 1
                          maximum: 1024
                          description: The number of conversation history messages cached in the custom LLM. History includes user and agent dialog messages, tool call information, and timestamps. Agent and user messages are recorded separately.
                        input_modalities:
                          type: array
                          default: ['text']
                          description: |-
                            LLM input modalities:
                            - `["text"]`: Text only
                            - `["text", "image"]`: Text plus image. Recommended configuration, requires the selected LLM to support visual input
                          items:
                            type: string
                        output_modalities:
                          type: array
                          default: ['text']
                          description: |-
                            LLM output modalities:
                            - `["text"]`: The output text is converted to speech by the TTS module and then published to the RTC channel.
                            - `["audio"]`: Voice only. Voice is published directly to the RTC channel.
                            - `["text", "audio"]`: Text plus voice. Write your own logic to process the output of LLM as needed.
                          items:
                            type: string
                        greeting_message:
                          type: string
                          description: Agent greeting. If provided, the first user in the channel is automatically greeted with the message upon joining.
                        failure_message:
                          type: string
                          description: Prompt for agent activation failure. If provided, it is returned through TTS when the custom LLM call fails.
                        vendor:
                          type: string
                          description: |-
                            LLM provider, supports the following settings:
                            - `custom`: Custom LLM. When you set this option, the agent includes the following fields, in addition to `role` and `content` when making requests to the custom LLM:
                              - `turn_id`: A unique identifier for each conversation turn. It starts from `0` and increments with each turn. One user-agent interaction corresponds to one `turn_id`.
                              - `timestamp`: The request timestamp, in milliseconds.
                            - `azure`: Use this value for Azure OpenAI
                        style:
                          type: string
                          default: openai
                          enum:
                            - openai
                            - gemini
                            - anthropic
                            - dify
                          description: |-
                            The request style for chat completion:
                            - `openai`: For OpenAI and OpenAI-compatible APIs
                            - `gemini`: For Google Gemini and Google Vertex API format
                            - `anthropic`: For Anthropic Claude API format
                            - `dify`: For Dify API format
                        greeting_configs:
                          type: object
                          description: Agent greeting broadcast configuration.
                          properties:
                            mode:
                              type: string
                              default: single_every
                              enum:
                                - single_every
                                - single_first
                              description: |-
                                Determines when the agent sends greeting messages to users joining the channel.
                                - `single_every`: Broadcasts a greeting every time a user joins the channel.
                                - `single_first`: Broadcasts a greeting only once to the first user who joins the channel.
                            delay_ms:
                              type: integer
                              minimum: 0
                              maximum: 5000
                              description: The delay in milliseconds before the agent plays the greeting message after a user joins the channel.
                            interruptable:
                              type: boolean
                              default: true
                              description: |-
                                - `true`: Follows the global `interruption` configuration.
                                - `false`: Uninterruptible. The greeting plays in its entirety. If the user speaks multiple times while the greeting plays, the system merges the speech segments after the greeting ends and sends them to the LLM for a single response.
                        template_variables:
                          type: object
                          description: Template parameter configuration used to insert variables into the agent's `system_messages`, `greeting_message`, `failure_message`, and `parameters.silence_config.content` text. Uses key-value pairs, where the key is the variable name and the value is the variable's value. To insert defined variables in the prompt text, use the syntax `{{variable_name}}`. The system automatically replaces each variable with the corresponding value defined in `template_variables`. Variable values cannot reference other variables.
                          additionalProperties:
                            type: string
                        mcp_servers:
                          type: array
                          description: MCP (Model Context Protocol) server configuration. By configuring MCP servers, agents can call tools provided by external services to implement advanced functionality.
                          items:
                            type: object
                            required:
                              - name
                              - endpoint
                            properties:
                              name:
                                type: string
                                maxLength: 48
                                description: A unique identifier for the MCP server. Maximum 48 characters. Accepts only English letters and numbers.
                              endpoint:
                                type: string
                                description: The endpoint address of the MCP server. The agent uses this to communicate with the MCP server.
                              transport:
                                type: string
                                enum:
                                  - streamable_http
                                description: |-
                                  Transport protocol type.
                                  - `streamable_http`: Streaming HTTP protocol
                              headers:
                                type: object
                                description: HTTP header information to include when requesting the MCP server, such as authentication information.
                                additionalProperties:
                                  type: string
                              allowed_tools:
                                type: array
                                description: |-
                                  A list of tools that the agent is allowed to invoke. The agent can only use tools on this list.
                                  - Empty or omitted: All tools are enabled.
                                  - Empty array `[]`: No tools are enabled.
                                  - `["*"]`: All tools are enabled.
                                  - Specific tools `["aa", "bb"]`: Only listed tools are enabled.
                                  - Mix with wildcard `["aa", "*"]`: All tools are enabled (wildcard takes precedence).
                                items:
                                  type: string
                              timeout_ms:
                                type: integer
                                description: The MCP server request timeout in milliseconds. After timeout, the agent stops waiting for the MCP server's response and continues executing subsequent logic.
                        headers:
                          type: object
                          description: Custom headers to include in requests to the LLM. Use this field to pass business-specific information such as custom fields or tenant identifiers. These headers are merged with the headers generated by the Conversational AI Engine. If a key conflict occurs, the engine-generated header takes precedence.
                          additionalProperties:
                            type: string
                    mllm:
                      type: object
                      description: Multimodal Large Language Model (MLLM) configuration for real-time audio and text processing. `mllm` is an exclusive alternative to the standard `asr` + `llm` + `tts` pipeline.
                      properties:
                        enable:
                          type: boolean
                          description: Enable Multimodal Large Language Model for voice-to-voice processing. Enabling MLLM automatically disables ASR, LLM, and TTS since the MLLM handles end-to-end voice processing directly. Replaces the deprecated `advanced_features.enable_mllm`.
                        url:
                          type: string
                          description: The MLLM WebSocket URL for real-time communication.
                        api_key:
                          type: string
                          description: The API key used for MLLM authentication.
                        messages:
                          type: array
                          description: Array of conversation items used for short-term memory management. Uses the same structure as `item.content` from the OpenAI Realtime API.
                          items:
                            type: object
                            additionalProperties: true
                        params:
                          type: object
                          description: Additional MLLM configuration parameters. The `modalities` setting is overridden by `input_modalities` and `output_modalities`. The `turn_detection` setting is overridden by `mllm.turn_detection`.
                          additionalProperties: true
                        input_modalities:
                          type: array
                          default: ['audio']
                          description: |-
                            MLLM input modalities:
                            - `["audio"]`: Audio only
                            - `["audio", "text"]`: Audio plus text
                          items:
                            type: string
                        output_modalities:
                          type: array
                          default: ['text', 'audio']
                          description: |-
                            MLLM output modalities:
                            - `["text", "audio"]`: Text plus audio
                          items:
                            type: string
                        greeting_message:
                          type: string
                          description: Agent greeting message. If provided, the first user in the channel is automatically greeted with this message upon joining.
                        vendor:
                          type: string
                          enum:
                            - openai
                            - gemini
                            - vertexai
                          description: |-
                            MLLM provider. Currently supports:
                            - `openai`: OpenAI Realtime API
                            - `gemini`: Google Gemini Live
                            - `vertexai`: Google Gemini Live (Vertex AI)
                        style:
                          type: string
                          default: openai
                          enum:
                            - openai
                          description: |-
                            The request style for MLLM completion:
                            - `openai`: For OpenAI Realtime API format
                        turn_detection:
                          type: object
                          description: Turn detection configuration for the MLLM module. When defined, the top-level `turn_detection` object has no effect.
                          properties:
                            mode:
                              type: string
                              enum:
                                - agora_vad
                                - server_vad
                                - semantic_vad
                              description: |-
                                Turn detection mode for MLLM:
                                - `agora_vad`: Agora VAD-based detection.
                                - `server_vad`: Vendor-side VAD-based detection. Supported by OpenAI Realtime API and Gemini Live.
                                - `semantic_vad`: Semantic-based detection. Supported by OpenAI Realtime API only.
                            agora_vad_config:
                              type: object
                              description: Configuration for Agora VAD-based turn detection. Applicable when `mode` is `agora_vad`.
                              properties:
                                interrupt_duration_ms:
                                  type: integer
                                  description: Minimum duration of speech in milliseconds required to trigger an interruption.
                                prefix_padding_ms:
                                  type: integer
                                  description: Duration of audio in milliseconds to include before the detected speech start.
                                silence_duration_ms:
                                  type: integer
                                  description: Duration of silence in milliseconds required to determine end of speech.
                                threshold:
                                  type: number
                                  description: VAD sensitivity threshold. A higher value reduces false positives.
                            server_vad_config:
                              type: object
                              description: Configuration for vendor-side VAD-based turn detection. Applicable when `mode` is `server_vad`. Parameters are passed through to the vendor.
                              properties:
                                prefix_padding_ms:
                                  type: integer
                                  description: Duration of audio in milliseconds to include before the detected speech start.
                                silence_duration_ms:
                                  type: integer
                                  description: Duration of silence in milliseconds required to determine end of speech.
                                threshold:
                                  type: number
                                  description: VAD sensitivity threshold. Applicable to OpenAI Realtime API only.
                                idle_timeout_ms:
                                  type: integer
                                  description: Idle timeout in milliseconds. Applicable to OpenAI Realtime API only.
                                start_of_speech_sensitivity:
                                  type: string
                                  enum:
                                    - START_SENSITIVITY_HIGH
                                    - START_SENSITIVITY_LOW
                                  description: Sensitivity for start of speech detection. Applicable to Gemini Live only.
                                end_of_speech_sensitivity:
                                  type: string
                                  enum:
                                    - END_SENSITIVITY_HIGH
                                    - END_SENSITIVITY_LOW
                                  description: Sensitivity for end of speech detection. Applicable to Gemini Live only.
                            semantic_vad_config:
                              type: object
                              description: Configuration for semantic-based turn detection. Applicable when `mode` is `semantic_vad`. Supported by OpenAI Realtime API only.
                              properties:
                                eagerness:
                                  type: string
                                  enum:
                                    - auto
                                    - low
                                    - medium
                                    - high
                                  description: Controls how eagerly the model ends its turn.
                    avatar:
                      type: object
                      description: Avatar configuration.
                      properties:
                        enable:
                          type: boolean
                          default: false
                          description: Whether to enable the avatar function for the agent. To enable, set to `true` and configure the `vendor` and `params` fields.
                        vendor:
                          type: string
                          enum:
                            - akool
                            - liveavatar
                            - anam
                            - generic
                          description: |-
                            Avatar vendor. Supports the following values:
                            - `akool`: Akool (Beta)
                            - `liveavatar`: LiveAvatar (Beta)
                            - `anam`: Anam (Beta)
                            - `generic`: Generic (Beta)
                        params:
                          type: object
                          description: The configuration parameters for the avatar vendor. See [AI Avatar Overview](https://docs.agora.io/en/conversational-ai/models/avatar/overview) for details.
                          additionalProperties: true
                    turn_detection:
                      type: object
                      description: Conversation turn detection settings. Controls the logic for voice activity detection and conversation turn determination. This object has no effect when `mllm.enable` is true; use `mllm.turn_detection` instead.
                      properties:
                        mode:
                          type: string
                          default: default
                          enum:
                            - default
                          description: |-
                            Conversation turn detection mode:
                            - `default`: Uses standard conversation turn detection configuration.
                        config:
                          type: object
                          description: Detailed configuration for conversation turn detection.
                          properties:
                            speech_threshold:
                              type: number
                              default: 0.5
                              minimum: 0.0
                              maximum: 1.0
                              description: Voice activity detection sensitivity. Determines the sound level in the audio signal that is considered voice activity. Lower values make it easier for the agent to detect speech, and higher values ignore weak sounds.
                            start_of_speech:
                              type: object
                              description: Start of Speech (SoS) detection configuration. Determines when a user begins speaking.
                              required:
                                - mode
                              properties:
                                mode:
                                  type: string
                                  enum:
                                    - vad
                                    - keywords
                                    - disabled
                                  description: |-
                                    Start of speech detection mode:
                                    - `vad`: Based on VAD (Voice Activity Detection). Uses audio signal detection.
                                    - `keywords`: Deprecated. Use `interruption.mode = "keywords"` instead.
                                    - `disabled`: Deprecated. Use `interruption.enable = false` with `interruption.disabled_config.strategy` to configure the handling strategy.
                                vad_config:
                                  type: object
                                  description: VAD configuration. Used when `mode` is `vad`.
                                  properties:
                                    interrupt_duration_ms:
                                      type: integer
                                      default: 160
                                      minimum: 120
                                      maximum: 1200
                                    speaking_interrupt_duration_ms:
                                      type: integer
                                      default: 160
                                      minimum: 120
                                      maximum: 1200
                                    prefix_padding_ms:
                                      type: integer
                                      default: 800
                                      minimum: 0
                                      maximum: 5000
                                keywords_config:
                                  type: object
                                  description: Keywords configuration. Used when `mode` is `keywords`.
                                  properties:
                                    interrupt_duration_ms:
                                      type: integer
                                      default: 160
                                      minimum: 120
                                      maximum: 1200
                                    prefix_padding_ms:
                                      type: integer
                                      default: 800
                                      minimum: 0
                                      maximum: 5000
                                    triggered_keywords:
                                      type: array
                                      items:
                                        type: string
                                disabled_config:
                                  type: object
                                  description: Disabled mode configuration. Used when `mode` is `disabled`.
                                  properties:
                                    strategy:
                                      type: string
                                      enum:
                                        - append
                                        - ignore
                                      description: |-
                                        Voice processing strategy when the agent is interacting:
                                        - `append`: Human voice does not interrupt the agent. The agent processes the human voice input after the current interaction ends.
                                        - `ignore`: The agent ignores human voice input and discards it without storing in context.
                            end_of_speech:
                              type: object
                              description: End of Speech (EoS) detection configuration. Determines when a user ends their speech.
                              properties:
                                mode:
                                  type: string
                                  enum:
                                    - vad
                                    - semantic
                                  description: |-
                                    End of speech detection mode:
                                    - `vad`: Based on VAD (Voice Activity Detection). Detects silence duration.
                                    - `semantic`: Based on semantic triggering. Uses semantic understanding to determine when conversation ends.
                                vad_config:
                                  type: object
                                  description: VAD configuration. Used when `mode` is `vad`.
                                  properties:
                                    silence_duration_ms:
                                      type: integer
                                      default: 640
                                      minimum: 120
                                      maximum: 2000
                                semantic_config:
                                  type: object
                                  description: Semantic configuration. Used when `mode` is `semantic`.
                                  properties:
                                    silence_duration_ms:
                                      type: integer
                                      default: 320
                                      minimum: 120
                                      maximum: 2000
                                    max_wait_ms:
                                      type: integer
                                      default: 3000
                                      minimum: 500
                                      maximum: 10000
                                      description: Maximum wait time in milliseconds. Use `-1` for no timeout. The maximum time to wait for semantic determination. After timeout, the conversation end is determined based on the current state.
                                    pause_state_enabled:
                                      type: boolean
                                      default: true
                                      description: |-
                                        Whether to detect user intent to pause the conversation:
                                        - `true`: The agent uses semantic understanding to determine if the user intends to pause the conversation. For example, when the user's input ends with phrases such as "hold on" or "just a moment", the agent waits for further input rather than treating the utterance as complete and sending it to the LLM.
                                        - `false`: The agent does not detect intent to pause the conversation.
                        type:
                          type: string
                          default: agora_vad
                          enum:
                            - agora_vad
                            - server_vad
                            - semantic_vad
                          deprecated: true
                          description: |-
                            Deprecated. Use `turn_detection.mode` and `turn_detection.config` instead.
                            Turn detection mechanism:
                            - `agora_vad`: Agora VAD
                            - `server_vad`: The model detects the start and end of speech based on audio volume. Only available when `mllm` is enabled and OpenAI is selected.
                            - `semantic_vad`: Uses a turn detection model with VAD to semantically estimate whether the user has finished speaking. Only available when `mllm` is enabled and OpenAI is selected.
                        interrupt_mode:
                          type: string
                          default: interrupt
                          deprecated: true
                          enum:
                            - interrupt
                            - append
                            - ignore
                            - keyword
                            - adaptive
                          description: |-
                            Deprecated. Use `turn_detection.config.start_of_speech` instead.
                            Sets the agent's behavior when human voice interrupts the agent while it is interacting (speaking or thinking):
                            - `interrupt`: The agent immediately stops the current interaction and processes the human voice input.
                            - `append`: The agent completes the current interaction, then processes the human voice input.
                            - `ignore`: The agent discards the human voice input without processing or storing it in the context.
                            - `keyword`: The agent stops its current interaction after detecting any of the keywords specified in `interrupt_keywords`.
                            - `adaptive`: The agent dynamically increases the voice continuity threshold while speaking to reduce accidental interruptions.
                        interrupt_duration_ms:
                          type: number
                          default: 160
                          deprecated: true
                          description: Deprecated. Use `turn_detection.config.start_of_speech.vad_config.interrupt_duration_ms` instead. The amount of time in milliseconds that the user's voice must exceed the VAD threshold before an interruption is triggered.
                        interrupt_keywords:
                          type: array
                          deprecated: true
                          description: Deprecated. Use `turn_detection.config.start_of_speech.keywords_config.triggered_keywords` instead. Specifies the list of keywords that trigger an interruption when `interrupt_mode` is set to `keyword`. You can configure up to 128 keywords.
                          items:
                            type: string
                        prefix_padding_ms:
                          type: integer
                          default: 800
                          deprecated: true
                          description: Deprecated. Use `turn_detection.config.start_of_speech.vad_config.prefix_padding_ms` instead. The extra forward padding time in milliseconds before the processing system starts to process the speech input.
                        silence_duration_ms:
                          type: integer
                          default: 640
                          deprecated: true
                          description: Deprecated. Use `turn_detection.config.end_of_speech.vad_config.silence_duration_ms` instead. The duration of audio silence in milliseconds. If no voice activity is detected during this period, the agent assumes that the user has stopped speaking.
                        threshold:
                          type: number
                          default: 0.5
                          minimum: 0.0
                          maximum: 1.0
                          deprecated: true
                          description: Deprecated. Use `turn_detection.config.speech_threshold` instead. Identification sensitivity determines the level of sound in the audio signal that is considered voice activity.
                        create_response:
                          type: boolean
                          default: true
                          description: Whether to automatically generate a response when a VAD stop event occurs. Only available in `server_vad` and `semantic_vad` modes when using OpenAI Realtime API.
                        interrupt_response:
                          type: boolean
                          default: true
                          description: Whether to automatically interrupt any ongoing response when a VAD start event occurs. Only available in `server_vad` and `semantic_vad` modes when using OpenAI Realtime API.
                        eagerness:
                          type: string
                          default: auto
                          deprecated: true
                          enum:
                            - auto
                            - low
                            - high
                          description: |-
                            Deprecated. Only available in `semantic_vad` mode when using OpenAI Realtime API.
                            The eagerness of the model to respond:
                            - `auto`: Equivalent to medium
                            - `low`: Wait longer for the user to continue speaking
                            - `high`: Respond more quickly
                    interruption:
                      type: object
                      description: Interruption control configuration. Provides unified management of the agent's behavior when interrupted by the user.
                      properties:
                        enable:
                          type: boolean
                          default: true
                          description: |-
                            Whether to enable agent interruption:
                            - `true`: Enable interruption.
                            - `false`: Disable interruption. When disabled, the agent cannot be interrupted mid-response.
                        mode:
                          type: string
                          default: start_of_speech
                          enum:
                            - start_of_speech
                            - keywords
                          description: |-
                            The interruption trigger mode:
                            - `start_of_speech`: Trigger interruption when the user starts speaking.
                            - `keywords`: Trigger interruption when the user speaks a specified keyword. Configure the trigger keywords in `keywords_config`.
                        keywords_config:
                          type: object
                          description: Configuration for keyword-based interruption triggering. Applicable only when `mode` is `keywords`.
                          properties:
                            trigger_keywords:
                              type: array
                              description: The list of keywords that trigger an interruption. A maximum of 128 keywords is supported.
                              items:
                                type: string
                        disabled_config:
                          type: object
                          description: Configuration for agent behavior when interruption is disabled. Applicable only when `interruption.enable` is `false`.
                          properties:
                            strategy:
                              type: string
                              enum:
                                - append
                                - ignore
                              description: |-
                                The processing strategy when interruption is disabled:
                                - `append`: User speech does not interrupt the agent. The agent processes the user's input after the current interaction ends.
                                - `ignore`: The agent ignores user speech. If the agent receives user speech while speaking or thinking, it discards the input without storing it in context.
                    sal:
                      type: object
                      description: Selective Attention Locking (SAL) configuration.
                      properties:
                        sal_mode:
                          type: string
                          default: locking
                          enum:
                            - locking
                            - recognition
                          description: |-
                            Selective attention lock mode:
                            - `locking`: Speaker Lock Mode. The agent locks onto the speaker, blocking 95% of ambient human voices and noise. You can enable this mode in two ways:
                              - Seamless mode: When a user speaks loudly and clearly at the beginning of a conversation, the intelligent agent automatically recognizes the user as the speaker.
                              - Personalized mode: When creating an agent, a speaker's voiceprint URL is pre-registered through the `sample_urls` field. The agent then locates the speaker based on the pre-registered voiceprint.
                            - `recognition`: Voiceprint recognition mode. The agent identifies different speakers and suppresses other background voices and environmental noise.
                        sample_urls:
                          type: object
                          description: |- 
                            The registered voiceprint URL as a key-value pair, where the key is the voiceprint name and the value is the download URL for the speaker's voiceprint. Only one voiceprint URL is supported.
                            > - Do not set the incoming voiceprint name to "unknown"; this is a reserved keyword used to identify unknown speakers.
                            > - For a registered voiceprint, ensure that:
                            >   - Size: A single voiceprint file must not exceed 2 MB.
                            >   - Duration: 10 to 15 seconds, with at least 8 seconds of effective audio without silent segments.
                            >   - Format: 16kHz sampling rate, 16-bit depth, mono PCM audio file. The file name extension must be ".pcm".      
                          additionalProperties:
                            type: string
                    labels:
                      type: object
                      description: Custom labels in key-value pair format, where the key is the label name and the value is the label value. Enables agents to carry custom business information. These labels are bound to the agent and returned in the `payload` field of all message notification callbacks from the conversational AI engine.
                      additionalProperties:
                        type: string
                    rtc:
                      type: object
                      description: RTC media encryption configuration.
                      properties:
                        encryption_key:
                          type: string
                          description: The encryption key for RTC media content. The key has no length limit. Agora recommends using a 32-byte key. If no encryption key is set or if the key is empty, built-in encryption is not used.
                        encryption_salt:
                          type: string
                          description: The salt value used for encryption. This is a Base64-encoded string that is 32 bytes long after decoding. This parameter only takes effect when `encryption_mode` is set to `7` (AES_128_GCM2) or `8` (AES_256_GCM2). Ensure that the salt parameter is not empty for these encryption modes.
                        encryption_mode:
                          type: integer
                          enum:
                            - 1
                            - 2
                            - 3
                            - 4
                            - 5
                            - 6
                            - 7
                            - 8
                          description: |-
                            The built-in encryption mode.
                            - `1`: AES_128_XTS - 128-bit AES encryption, XTS mode.
                            - `2`: AES_128_ECB - 128-bit AES encryption, ECB mode.
                            - `3`: AES_256_XTS - 256-bit AES encryption, XTS mode.
                            - `4`: SM4_128_ECB - 128-bit SM4 encryption, ECB mode.
                            - `5`: AES_128_GCM - 128-bit AES encryption, GCM mode.
                            - `6`: AES_256_GCM - 256-bit AES encryption, GCM mode.
                            - `7`: AES_128_GCM2 - 128-bit AES encryption, GCM mode. Requires setting `encryption_salt`.
                            - `8`: AES_256_GCM2 - 256-bit AES encryption, GCM mode. Requires setting `encryption_salt`.
                    filler_words:
                      type: object
                      description: Filler word configuration. Plays filler words while waiting for LLM responses to reduce user anxiety and improve conversation flow.
                      properties:
                        enable:
                          type: boolean
                          default: false
                          description: |-
                            Whether to enable filler words:
                            - `true`: Enable filler words.
                            - `false`: Disable filler words.
                        trigger:
                          type: object
                          description: Filler word trigger configuration. Defines when to trigger filler word playback.
                          properties:
                            mode:
                              type: string
                              enum:
                                - fixed_time
                              description: |-
                                Filler word trigger mode:
                                - `fixed_time`: Fixed time trigger. Triggers filler word playback when LLM response wait time exceeds the threshold.
                            fixed_time_config:
                              type: object
                              description: Fixed time trigger configuration. Used when `mode` is `fixed_time`.
                              properties:
                                response_wait_ms:
                                  type: integer
                                  default: 1500
                                  minimum: 100
                                  maximum: 10000
                                  description: LLM response wait threshold in milliseconds. Triggers filler word playback when the LLM waits this duration without generating a response.
                        content:
                          type: object
                          description: Filler word content configuration. Defines the source and selection rules for filler words.
                          properties:
                            mode:
                              type: string
                              enum:
                                - static
                              description: |-
                                Filler word content mode:
                                - `static`: Static filler words. Uses a predefined list of filler words.
                            static_config:
                              type: object
                              description: Static filler word configuration. Used when `mode` is `static`.
                              required:
                                - phrases
                              properties:
                                phrases:
                                  type: array
                                  description: List of filler word phrases. Maximum 100 filler words, each not exceeding 50 English words.
                                  items:
                                    type: string
                                selection_rule:
                                  type: string
                                  enum:
                                    - shuffle
                                    - round_robin
                                  description: |-
                                    Filler word selection rule:
                                    - `shuffle`: Random shuffle. Already-used filler words are not repeated until all have been used once.
                                    - `round_robin`: Round-robin. Selects and plays filler words sequentially from the list.
                    parameters:
                      type: object
                      description: Agent configuration parameters.
                      properties:
                        silence_config:
                          type: object
                          description: Settings related to agent silence behavior. Does not apply when you integrate a `mllm`.
                          properties:
                            timeout_ms:
                              type: integer
                              default: 0
                              minimum: 0
                              maximum: 60000
                              description: |-
                                Specifies the maximum duration (in milliseconds) that the agent can remain silent.
                                - `0`: Disables the silent reminder feature.
                                - `(0, 60000]`: Enables the silent reminder. You must also set `content`.
                            action:
                              type: string
                              default: speak
                              enum:
                                - speak
                                - think
                              description: |-
                                Specifies how the agent behaves when the silent timeout is reached:
                                - `speak`: Uses the TTS module to announce the silent prompt (`content`).
                                - `think`: Appends the silent prompt (`content`) to the context and passes it to the LLM.
                            content:
                              type: string
                              description: Specifies the silent prompt message. The message use depends on the value of `action` parameter.
                        farewell_config:
                          type: object
                          description: Graceful hang-up settings for the agent.
                          properties:
                            graceful_enabled:
                              type: boolean
                              default: false
                              description: |-
                                Enable graceful leave:
                                - `true`: When enabled, calling the POST method to stop the agent ensures that the agent is in an `IDLE` state before leaving the channel.
                                - `false`: Disabled.
                            graceful_timeout_seconds:
                              type: integer
                              default: 30
                              minimum: 0
                              maximum: 120
                              description: Graceful exit timeout (in seconds). Represents the maximum time to wait for the agent to enter an `IDLE` state before exiting the channel. This field is only effective when `graceful_enabled` is `true`.
                        data_channel:
                          type: string
                          default: datastream
                          enum:
                            - rtm
                            - datastream
                          description: |-
                            Agent data transmission channel:
                            - `rtm`: Use RTM transmission. This configuration takes effect only when `advanced_features.enable_rtm` is `true`.
                            - `datastream`: Use RTC data stream transport.
                        enable_metrics:
                          type: boolean
                          default: false
                          description: Whether to receive agent performance data. This setting only takes effect when `advanced_features.enable_rtm` is `true`.
                        enable_error_message:
                          type: boolean
                          default: false
                          description: Whether to receive agent error events. This setting only takes effect when `advanced_features.enable_rtm` is `true`.
                        audio_scenario:
                          type: string
                          default: default
                          enum:
                            - default
                            - chorus
                            - aiserver
                          description: |-
                            The audio scenario for the RTC channel.
                            - `default`: Maps to `aiserver`.
                            - `chorus`: Real-time chorus scenario, where users have good network conditions and require ultra-low latency.
                            - `aiserver`: Optimized for interactions between the user and the conversational AI agent in terms of latency and network resilience.
            examples:
              Default:
                value:
                  name: unique_name
                  properties:
                    channel: channel_name
                    token: token
                    agent_rtc_uid: '1001'
                    remote_rtc_uids:
                      - '1002'
                    idle_timeout: 120
                    advanced_features:
                      enable_aivad: true
                    llm:
                      url: https://api.openai.com/v1/chat/completions
                      api_key: <your_llm_key>
                      system_messages:
                        - role: system
                          content: You are a helpful chatbot.
                      max_history: 32
                      greeting_message: Hello, how can I assist you today?
                      failure_message: Please hold on a second.
                      params:
                        model: gpt-4o-mini
                    tts:
                      vendor: microsoft
                      params:
                        key: <your_tts_api_key>
                        region: eastus
                        voice_name: en-US-AndrewMultilingualNeural
                    asr:
                      language: en-US
      responses:
        '200':
          description: Request was successful. The response body contains the result of the request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                    description: Unique id of the agent instance
                  create_ts:
                    type: integer
                    description: Timestamp of when the agent was created
                  status:
                    type: string
                    enum:
                      - IDLE
                      - STARTING
                      - RUNNING
                      - STOPPING
                      - STOPPED
                      - FAILED
                    description: |-
                      Current status:
                      - `IDLE` (0): Agent is idle.
                      - `STARTING` (1): The agent is being started.
                      - `RUNNING` (2): The agent is running.
                      - `STOPPING` (3): The agent is stopping.
                      - `STOPPED` (4): The agent has exited.
                      - `FAILED` (6): The agent failed to execute.
              examples:
                Success:
                  value:
                    agent_id: 1NT29X10YHxxxxxWJOXLYHNYB
                    create_ts: 1737111452
                    status: RUNNING
        default:
          description: Request failed. The response body includes the `detail` and `reason` for failure.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: Error detail message
                  reason:
                    type: string
                    description: Error reason code

  /v2/projects/{appid}/agents:
    get:
      tags:
        - Agent Management
      summary: Retrieve a list of agents
      description: Retrieve a list of agents that meet the specified conditions.
      operationId: list-agents
      parameters:
        - $ref: '#/components/parameters/appid'
        - name: channel
          in: query
          required: false
          description: The channel to query for a list of agents.
          schema:
            type: string
        - name: from_time
          in: query
          required: false
          description: The start timestamp (in seconds) for the query. Default is 2 hours ago.
          schema:
            type: number
        - name: to_time
          in: query
          required: false
          description: The end timestamp (in seconds) for the query. Default is current time.
          schema:
            type: number
        - name: state
          in: query
          required: false
          description: |-
            The agent state to filter by. Only one state can be specified per query:
            - `IDLE` (0): Agent is idle.
            - `STARTING` (1): The agent is being started.
            - `RUNNING` (2): The agent is running.
            - `STOPPING` (3): The agent is stopping.
            - `STOPPED` (4): The agent has exited.
            - `FAILED` (6): The agent failed to execute.
          schema:
            type: string
            default: '2'
            enum:
              - '0'
              - '1'
              - '2'
              - '3'
              - '4'
              - '5'
              - '6'
        - name: limit
          in: query
          required: false
          description: The maximum number of entries returned per page.
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          description: The paging cursor, indicating the starting position (`agent_id`) of the next page of results.
          schema:
            type: string
      responses:
        '200':
          description: Request was successful. The response body contains the result of the request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Agent data.
                    properties:
                      count:
                        type: integer
                        description: The number of agents returned.
                      list:
                        type: array
                        description: A list of agents that meets the criteria.
                        items:
                          type: object
                          properties:
                            start_ts:
                              type: integer
                              description: Agent creation timestamp.
                            status:
                              type: string
                              enum:
                                - IDLE
                                - STARTING
                                - RUNNING
                                - STOPPING
                                - STOPPED
                                - FAILED
                              description: The current state of the agent.
                            agent_id:
                              type: string
                              description: The agent ID.
                  meta:
                    type: object
                    description: Returns meta information about the list.
                    properties:
                      cursor:
                        type: string
                        description: Paging cursor.
                      total:
                        type: integer
                        description: The total number of agents that meet the query conditions.
                  status:
                    type: string
                    description: Request status.
              examples:
                Success:
                  value:
                    data:
                      count: 1
                      list:
                        - start_ts: 1735035893
                          status: RUNNING
                          agent_id: 1234567890ABCDE1CVGZNU80BEIN56XF
                    meta:
                      cursor: ''
                      total: 1
                    status: ok
        default:
          description: Request failed. The response body includes the `detail` and `reason` for failure.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: Error detail message
                  reason:
                    type: string
                    description: Error reason code

  /v2/projects/{appid}/agents/{agentId}:
    get:
      tags:
        - Agent Management
      summary: Query agent status
      description: Get the current state information of the specified agent instance.
      operationId: query-agent-status
      parameters:
        - $ref: '#/components/parameters/appid'
        - $ref: '#/components/parameters/agentId'
      responses:
        '200':
          description: Request was successful. The response body contains the result of the request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Request message.
                  start_ts:
                    type: integer
                    description: Agent creation timestamp.
                  stop_ts:
                    type: integer
                    description: Agent stop timestamp.
                  status:
                    type: string
                    enum:
                      - IDLE
                      - STARTING
                      - RUNNING
                      - STOPPING
                      - STOPPED
                      - FAILED
                    description: |-
                      Current status:
                      - `IDLE` (0): Agent is idle.
                      - `STARTING` (1): The agent is being started.
                      - `RUNNING` (2): The agent is running.
                      - `STOPPING` (3): The agent is stopping.
                      - `STOPPED` (4): The agent has exited.
                      - `FAILED` (6): The agent failed to execute.
                  agent_id:
                    type: string
                    description: Unique id of the agent instance
              examples:
                Success:
                  value:
                    message: 'agent exits with reason: xxxx'
                    start_ts: 1735035893
                    stop_ts: 1735035900
                    status: FAILED
                    agent_id: 1NT29X11GQSxxxxxNU80BEIN56XF
        default:
          description: Request failed. The response body includes the `detail` and `reason` for failure.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: Error detail message
                  reason:
                    type: string
                    description: Error reason code

  /v2/projects/{appid}/agents/{agentId}/history:
    get:
      tags:
        - Agent Management
      summary: Retrieve agent history
      description: |-
        Get the history of the conversation between the user and the agent.
        
        Call this endpoint while the agent is running to retrieve the conversation history. You can set the maximum number of cached entries using the `llm.max_history` parameter when calling the start agent endpoint. The default value is `32`.
      operationId: get-agent-history
      parameters:
        - $ref: '#/components/parameters/appid'
        - $ref: '#/components/parameters/agentId'
      responses:
        '200':
          description: Request was successful. The response body contains the result of the request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                    description: Unique identifier of the agent.
                  start_ts:
                    type: integer
                    description: Agent creation timestamp.
                  status:
                    type: string
                    enum:
                      - RUNNING
                    description: Agent status. Only supports querying the running agent.
                  contents:
                    type: array
                    description: Agent history.
                    items:
                      type: object
                      properties:
                        role:
                          type: string
                          enum:
                            - user
                            - assistant
                          description: |-
                            The message sender:
                            - `user`: User
                            - `assistant`: AI agent
                        content:
                          type: string
                          description: Message content.
              examples:
                Success:
                  value:
                    agent_id: xxxx
                    start_ts: 123
                    status: RUNNING
                    contents:
                      - role: user
                        content: hello.
                      - role: assistant
                        content: hi, how can I help you?
        default:
          description: Request failed. The response body includes the error code and description.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: Error detail message
                  reason:
                    type: string
                    description: Error reason code

  /v2/projects/{appid}/agents/{agentId}/turns:
    get:
      tags:
        - Agent Management
      summary: Query conversation turn information
      description: |-
        Query conversation turn information for a conversational AI agent session.

        After a conversation with the agent ends, use this endpoint to query the conversation turn information, including the start information, end information, and performance metrics of each conversation turn.

        You can query sessions within the last 7 days.
      operationId: get-agent-turns
      parameters:
        - $ref: '#/components/parameters/appid'
        - $ref: '#/components/parameters/agentId'
        - name: page_index
          in: query
          required: false
          description: The page number. Starts from 1.
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          required: false
          description: The number of dialogue turns returned per page.
          schema:
            type: integer
            default: 50
            minimum: 10
            maximum: 200
      responses:
        '200':
          description: Request was successful. The response body contains the result of the request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                    description: The unique identifier of the agent.
                  name:
                    type: string
                    description: The name of the agent.
                  channel:
                    type: string
                    description: The name of the RTC channel the agent joined.
                  total_turn_count:
                    type: integer
                    description: The total number of dialogue turns in the current session.
                  pagination:
                    type: object
                    description: Pagination information.
                    properties:
                      page_index:
                        type: integer
                        description: The current page number; starts from 1.
                      total_pages:
                        type: integer
                        description: The total number of pages.
                      is_last_page:
                        type: boolean
                        description: True if the current page is the last page.
                  turns:
                    type: array
                    description: A list of conversation turns for the agent session.
                    items:
                      type: object
                      properties:
                        agent_id:
                          type: string
                          description: The unique identifier of the agent.
                        channel:
                          type: string
                          description: The name of the RTC channel the agent joined.
                        turn_id:
                          type: number
                          description: The sequential index of the turn within the session. Starts at `1`.
                        start:
                          type: object
                          description: Details about the start of the turn.
                          properties:
                            start_at:
                              type: number
                              description: The Unix timestamp in milliseconds (UTC time) when the turn started.
                            type:
                              type: string
                              enum:
                                - voice_input
                                - greeting
                                - silence_timeout
                                - api_speak
                              description: |-
                                The type of event that initiated the turn.
                                - `voice_input`: The turn was initiated by user voice input.
                                - `greeting`: The turn was initiated by an agent greeting.
                                - `silence_timeout`: The turn was initiated due to a silence timeout.
                                - `api_speak`: The turn was initiated by a call to the speak API.
                            metadata:
                              type: object
                              description: Additional context about the turn start event. Included fields depend on the value of the `type` field.
                              properties:
                                speech_duration_ms:
                                  type: integer
                                  description: The duration of the user's voice input in milliseconds. Included only when `type` is `voice_input`.
                                interrupt_duration_ms:
                                  type: integer
                                  description: The minimum voice duration in milliseconds required to trigger an interruption. Included only when `type` is `voice_input`.
                                greeting_nth:
                                  type: integer
                                  description: The index of the current greeting occurrence. Included only when `type` is `greeting`.
                                action:
                                  type: string
                                  description: |-
                                    The action taken in response to the silence timeout. Included only when `type` is `silence_timeout`.
                                    - `speak`: Plays the silence prompt message to the user.
                                    - `think`: Appends the silence message to the conversation context and passes it to the LLM.
                                transport:
                                  type: string
                                  description: |-
                                    The transport protocol used to deliver the speak request. Included only when `type` is `api_speak`.
                                    - `http`: Delivered over HTTP.
                                    - `rtm`: Delivered through the RTM Presence channel.
                        end:
                          type: object
                          description: Details about the end of the turn.
                          properties:
                            end_at:
                              type: number
                              description: The Unix timestamp in milliseconds (UTC time) when the turn ended.
                            type:
                              type: string
                              enum:
                                - ok
                                - interrupted
                                - ignored
                                - error
                              description: |-
                                The type of event that ended the turn.
                                - `ok`: The turn ended normally.
                                - `interrupted`: The turn was interrupted.
                                - `ignored`: The turn was ignored.
                                - `error`: The turn ended due to an error.
                            metadata:
                              type: object
                              description: Additional context about the turn end event. Included fields depend on the value of the `type` field.
                              properties:
                                playback_duration_ms:
                                  type: integer
                                  description: The audio playback duration in milliseconds. Included only when `type` is `ok`.
                                caused_by:
                                  type: string
                                  description: |-
                                    The cause of the turn ending.

                                    When `type` is `interrupted`, possible values are:
                                    - `start_of_speech`: A new voice input interrupted the turn.
                                    - `api_speak`: The turn was interrupted by a call to the speak API.
                                    - `api_interrupt`: The turn was interrupted by a call to the interrupt API.
                                    - `api_leave`: The turn was interrupted because the agent left the channel.

                                    When `type` is `ignored`, possible values are:
                                    - `semantic`: The turn was ignored because semantic end-of-speech detection determined no response was required. Applies when `turn_detection.config.end_of_speech.mode` is set to `semantic`.
                                    - `keywords`: The turn was ignored because the start keyword was not detected. Applies when `turn_detection.config.start_of_speech.mode` is set to `keywords`.
                                    - `disable`: The turn was ignored because interruption is disabled for this turn.
                                transport:
                                  type: string
                                  description: |-
                                    The transport protocol used to deliver the request. Included only when `caused_by` is `api_speak` or `api_interrupt`.
                                    - `http`: Delivered over HTTP.
                                    - `rtm`: Delivered through the RTM Presence channel.
                                reason:
                                  type: string
                                  description: |-
                                    The error type. Included only when `type` is `error`.
                                    - `LLM_REQUEST_ERR`: LLM request error.
                                    - `INTERNAL_ERR`: Internal error.
                                details:
                                  type: string
                                  description: Additional error details. Included only when `type` is `error`.
                        metrics:
                          type: object
                          description: Latency metrics for the turn.
                          properties:
                            e2e_latency_ms:
                              type: integer
                              description: The end-to-end latency in milliseconds for the turn.
                            segmented_latency_ms:
                              type: array
                              description: A breakdown of latency by segment.
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                    description: |-
                                      The name of the latency segment.

                                      When the LLM input modality is `text`, the returned segments are:
                                      - `algorithm_processing`: Algorithm processing delay.
                                      - `asr_ttlw`: The ASR Time To Last Word (TTLW) in milliseconds. Represents the delay from when the user finishes speaking to when the ASR module outputs the last word.
                                      - `llm_ttft`: The LLM Time To First Token (TTFT) in milliseconds. Represents the delay from when the user finishes speaking to when the LLM outputs the first token.
                                      - `llm_ftfs`: The LLM First Token To First Sentence (FTFS) in milliseconds. Represents the delay from when the LLM outputs the first token to when it outputs the first complete sentence.
                                      - `tts_ttfb`: The TTS Time To First Byte (TTFB) in milliseconds. Represents the delay from when the TTS module receives a text request to when it outputs the first audio byte.
                                      - `transport`: Network transmission delay in milliseconds. Not returned when the user is connected using the RTC Web SDK.

                                      When the LLM input modality is `audio`, the returned segments are:
                                      - `algorithm_processing`: Algorithm processing delay.
                                      - `asr_ttlw`: The ASR Time To Last Word (TTLW) in milliseconds. Represents the delay from when the user finishes speaking to when the ASR module outputs the last word.
                                      - `llm_ttfa`: The LLM Time To First Audio Byte (TTFA) in milliseconds. Represents the delay from when the user finishes speaking to when the LLM outputs the first audio byte.
                                      - `transport`: Network transmission delay in milliseconds. Not returned when the user is connected using the RTC Web SDK.
                                  latency:
                                    type: number
                                    description: The latency in milliseconds for the segment.
              examples:
                Success:
                  value:
                    agent_id: 'A42Axxxxxxxxx37MT56J'
                    name: 'support_agent_001'
                    channel: 'test_channel'
                    total_turn_count: 250
                    pagination:
                      page_index: 1
                      total_pages: 5
                      is_last_page: false
                    turns:
                      - agent_id: 'A42Axxxxxxxxx37MT56J'
                        channel: 'test_channel'
                        turn_id: 1
                        start:
                          start_at: 1774579820147
                          type: greeting
                          metadata:
                            greeting_nth: 1
                        end:
                          end_at: 1774579822412
                          type: interrupted
                          metadata:
                            caused_by: api_interrupt
                            transport: rtm
                        metrics:
                          e2e_latency_ms: 337
                          segmented_latency_ms:
                            - name: tts_ttfb
                              latency: 337
        default:
          description: Request failed. The response body includes the error code and description.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: Error detail message
                  reason:
                    type: string
                    description: Error reason code

  /v2/projects/{appid}/agents/{agentId}/leave:
