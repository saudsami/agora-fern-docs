  /v2/phone-numbers:
    get:
      tags:
        - Phone Number Management
      summary: Retrieve number list
      description: Retrieve a list of all imported phone numbers under the current account.
      operationId: retrieve-number-list
      responses:
        '200':
          description: Request was successful. The response body contains a JSON array of phone number configurations.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    provider:
                      type: string
                      enum:
                        - byo
                        - twilio
                      description: |-
                        Number provider:
                        - `byo`: BYO (Bring Your Own).
                        - `twilio`: Twilio.
                    phone_number:
                      type: string
                      description: A telephone number in E.164 format, used as a unique identifier.
                    label:
                      type: string
                      description: A label used to identify the number.
                    inbound:
                      type: boolean
                      description: Whether the number supports inbound calls.
                    outbound:
                      type: boolean
                      description: Whether the number supports outbound calls.
                    associated_pipeline:
                      type: object
                      nullable: true
                      description: The associated pipeline information. Returns `null` if no pipeline is associated.
                      properties:
                        pipeline_id:
                          type: string
                          description: Pipeline ID.
                        pipeline_name:
                          type: string
                          description: Pipeline name.
                    inbound_config:
                      type: object
                      nullable: true
                      description: SIP inbound call configuration details. Returns `null` if not configured.
                      additionalProperties: true
                    outbound_config:
                      type: object
                      nullable: true
                      description: SIP outbound call configuration details. Returns `null` if not configured.
                      additionalProperties: true
              examples:
                Success:
                  value:
                    - provider: twilio
                      phone_number: '+11234567890'
                      label: Customer Support Line
                      inbound: true
                      outbound: true
                      associated_pipeline:
                        pipeline_id: pipeline_0987654321fedcba
                        pipeline_name: Customer Service
                    - provider: byo
                      phone_number: '+19876543210'
                      label: Sales
                      inbound: false
                      outbound: true
                      associated_pipeline: null
                      inbound_config: {}
                      outbound_config: {}
        default:
          description: |- 
            Request failed. The response body includes the error code and description.

            **Common error codes:**
            - `401` `unauthorized`: Authentication failed, please check your credentials.
            - `404` `not_found`: The specified phone number was not found.
            - `409` `phone_number_exists`: Phone number already exists, duplicate import not allowed.
            - `409` `conflict`: Concurrent modification conflict or resource locked.
            - `422` `unprocessable_content`: Request format error or parameter validation failed.
            - `500` `internal_server_error`: Internal server error. 
          
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_type:
                    type: string
                    description: The type of error that occurred.
                  description:
                    type: string
                    description: A detailed description of the error.
              examples:
                Error:
                  value:
                    error_type: unauthorized
                    description: Authentication failed. Please check your credentials.

    post:
      tags:
        - Phone Number Management
      summary: Import number
      description: Import a pre-configured phone number that can be used for inbound or outbound calls.
      operationId: import-number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
                - phone_number
                - label
                - inbound_config
                - outbound_config
              properties:
                provider:
                  type: string
                  enum:
                    - byo
                    - twilio
                  description: |-
                    Number provider:
                    - `byo`: BYO (Bring Your Own)
                    - `twilio`: Twilio
                phone_number:
                  type: string
                  description: Telephone number in E.164 format.
                label:
                  type: string
                  description: A label used to identify the number.
                inbound:
                  type: boolean
                  default: true
                  description: Whether the number supports inbound calls.
                outbound:
                  type: boolean
                  default: true
                  description: Whether the number supports outbound calls.
                inbound_config:
                  type: object
                  description: SIP inbound call configuration.
                  properties:
                    allowed_addresses:
                      type: array
                      description: List of allowed IP addresses. For example `112.126.15.64/27`
                      items:
                        type: string
                outbound_config:
                  type: object
                  description: SIP outbound call configuration.
                  properties:
                    address:
                      type: string
                      description: SIP address. For example `xxx:xxx@sip.example.com`
                    transport:
                      type: string
                      description: Transport protocol. For example `tls`
                    prefix:
                      type: string
                      description: Number prefix. For example `6036`
            examples:
              Import BYO number:
                value:
                  provider: byo
                  phone_number: '+19876543210'
                  label: Sales Hotline
                  inbound: true
                  outbound: true
                  inbound_config:
                    allowed_addresses:
                      - '112.126.15.64/27'
                  outbound_config:
                    address: xxx:xxx@sip.example.com
                    transport: tls
      responses:
        '201':
          description: Request was successful. The response body contains the result of the request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  phone_number:
                    type: string
                    description: A telephone number in E.164 format, used as a unique identifier.
                  label:
                    type: string
                    description: A label used to identify the number.
                  provider:
                    type: string
                    description: Number provider.
                  inbound:
                    type: boolean
                    description: Whether the number supports inbound calls.
                  outbound:
                    type: boolean
                    description: Whether the number supports outbound calls.
                  associated_pipeline:
                    type: object
                    nullable: true
                    description: The associated pipeline information. Returns `null` if no pipeline is associated.
                    properties:
                      pipeline_id:
                        type: string
                        description: Pipeline ID.
                      pipeline_name:
                        type: string
                        description: Pipeline name.
              examples:
                Not bound to pipeline:
                  value:
                    phone_number: '+11234567890'
                    label: Customer Support Line
                    provider: byo
                    inbound: true
                    outbound: true
                    associated_pipeline: null
                Bound to pipeline:
                  value:
                    phone_number: '+11234567890'
                    label: Customer Support Line
                    provider: byo
                    inbound: true
                    outbound: true
                    associated_pipeline:
                      pipeline_id: agent_0987654321fedcba
                      pipeline_name: Support Bot
        default:
          description: |- 
            Request failed. The response body includes the error code and description.

            **Common error codes:**
            - `400` `invalid_phone_format`: Invalid phone number format (not in E.164 format).
            - `401` `unauthorized`: Authentication failed, please check your credentials.
            - `409` `phone_number_exists`: Phone number already exists, duplicate import not allowed.
            - `422` `unprocessable_content`: Request format error or parameter validation failed.
            - `500` `internal_server_error`: Internal server error.             
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    description: The type of error that occurred.
                  reason:
                    type: string
                    description: The reason for the error.
              examples:
                Error:
                  value:
                    detail: Invalid phone number format (not E.164 format).
                    reason: invalid_phone_format

