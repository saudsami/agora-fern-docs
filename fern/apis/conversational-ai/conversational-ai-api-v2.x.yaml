tags:
  - name: Agent Management
    description: Operations for managing conversational AI agents
  - name: Telephony
    description: Operations for telephony and outbound calling
  - name: Phone Number Management
    description: Operations for managing phone numbers

components:
  parameters:
    appid:
      name: appid
      in: path
      description: The App ID of the project.
      required: true
      schema:
        type: string

    agentId:
      name: agentId
      in: path
      description: The agent instance ID you obtained after successfully calling `join` to start a conversational AI agent.
      required: true
      schema:
        type: string

  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: |-
        Basic HTTP Authentication is required for all API endpoints.
        
        **Authentication Steps:**
        1. Obtain your App ID and App Certificate from the Agora Console
        2. Combine them in the format: `AppID:AppCertificate`
        3. Base64 encode the combined string
        4. Add the encoded value to the Authorization header as: `Authorization: Basic <base64_encoded_credentials>`
    AgoraToken:
      type: apiKey
      in: header
      name: Authorization
      description: |-
        Token-based authentication scoped to a specific app ID and channel.
        Pass the full `Authorization` header value in one of the following formats:
        
        **Agora token:**
        ```
        Authorization: agora token=<RTC+RTM_token>
        ```
        
        **Bearer credentials:**
        ```
        Authorization: Bearer base64(<customerID:customerSecret>)
        ```
        
        **Token generation:**
        - Generate a token on your server using the Agora token builder.
        - The UID passed to the token builder must match the `agent_rtc_uid` value in the request body.
        - Both integer UIDs and string UIDs are supported. Use `BuildTokenWithUid` for integer UIDs, or `BuildTokenWithUserAccount` for string UIDs.
        - Tokens expire after a maximum of 86400 seconds (24 hours). Regenerate and reuse tokens on each request, or implement a token server to issue tokens on demand.
        - If you enable the Signaling (RTM) service (`advanced_features.enable_rtm: true`), the token must include both RTC and RTM privileges.
        
        > Generate tokens server-side. Never expose your App Certificate in client code.
        
security:
  - BasicAuth: []
  - AgoraToken: []
