instances:
  - url: https://agora-ss.docs.buildwithfern.com

title: Agora | Documentation
favicon: ./assets/favicon.ico

logo:
  light: ./assets/agora.png
  dark: ./assets/agora.png
  height: 40

#layout:
#  switcher-placement: sidebar

landing-page:
  page: Welcome
  path: ./pages/welcome.mdx
  
products:
  - display-name: Conversational AI
    slug: conversational-ai
    path: ./products/conversational-ai.yml
    icon: microphone
  - display-name: Video Calling
    path: ./products/video-calling/versions/4.x/4.x.yml  # default to latest
    icon: video
    slug: video-calling  # optional
    subtitle: Realtime communication  # optional
    versions:
      - display-name: 4.x
        path: ./products/video-calling/versions/4.x/4.x.yml
      - display-name: 3.x
        path: ./products/video-calling/versions/3.x/3.x.yml
  - display-name: Signaling
    slug: signaling
    path: ./products/signaling.yml
    icon: bell

navbar-links:
  - type: secondary
    text: Build with AI
    url: https://docs.agora.io
  - type: secondary
    text: API Reference
    url: https://docs.agora.io
  - type: secondary
    text: SDKs
    url: https://docs.agora.io
  - type: primary
    text: Console
    url: https://console.agora.io

css: styles.css

experimental:
  mdx-components:
    - ./components    